<!doctype html>
<meta charset="utf-8" />
<title>mong-audio harness</title>
<body>
  <p>Bấm "khởi động" trước — WebAudio đòi cử chỉ người dùng.</p>
  <button id="unlock">khởi động</button>
  <button id="sfx" disabled>chuông cửa</button>
  <button id="bgm" disabled>nhạc on/off</button>
  <input id="vol" type="range" min="0" max="1" step="0.05" value="1" disabled />
  <pre id="log"></pre>

  <script type="module">
    import init, { Harness } from "./dist/mong_web.js";

    const log = (m) => (document.getElementById("log").textContent += m + "\n");
    const grab = async (p) => new Uint8Array(await (await fetch(p)).arrayBuffer());

    try {
      // Bắt mọi AudioContext cpal tạo ra. kira không lộ handle này.
          const ctxs = [];
          for (const k of ["AudioContext", "webkitAudioContext"]) {
            const Orig = window[k];
            if (!Orig) continue;
            window[k] = class extends Orig {
              constructor(...a) { super(...a); ctxs.push(this); }
            };
          }
      await init();
      const base = "../../examples/quan-ca-phe/assets/audio";
      const h = new Harness(
        await grab(`${base}/chuong_cua.wav`),
        await grab(`${base}/nhac_quan.wav`),
      );
      log(`WebAudio::new() OK — AudioContext: ${ctxs.length} cai (phai la 0)`);

      // Xếp hàng trước gesture: đúng kịch bản thật của runtime.
      h.bgm(true);
      log("bgm() goi truoc unlock — phai im lang");

      let on = true;
      document.getElementById("unlock").onclick = () => {
        h.unlock();
        log(`unlock() — AudioContext: ${ctxs.length} cai, state = ${ctxs.map((c) => c.state)}`);
        for (const id of ["sfx", "bgm", "vol"])
          document.getElementById(id).disabled = false;
      };
      document.getElementById("sfx").onclick = () => h.sfx();
      document.getElementById("bgm").onclick = () => h.bgm((on = !on));
      document.getElementById("vol").oninput = (e) => h.volume(+e.target.value);
    } catch (e) {
      log("HONG: " + e);
      throw e;
    }
  </script>
</body>
