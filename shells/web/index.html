<!doctype html>
<meta charset="utf-8" />
<title>Mộng Engine</title>
<style>
  html, body { margin: 0; height: 100%; background: #000; overflow: hidden; }
  /* Letterbox do renderer lo (khung ảo 1920×1080); canvas cứ phủ kín. */
  #mong { display: block; width: 100%; height: 100%; touch-action: none; }
</style>
<canvas id="mong"></canvas>
<script type="module">
  import init, { start } from "./dist/mong_web.js";

  window.__mong_log = [];
  for (const k of ["log", "warn", "error"]) {
    const orig = console[k];
    console[k] = (...a) => {
      window.__mong_log.push(k + ": " + a.map(String).join(" "));
      orig.apply(console, a);
    };
  }

  // Panic Rust sau khi start() trả về chạy ở task spawn_local khác — khối
  // catch bên dưới (chỉ bọc lời gọi đồng bộ) không thấy. Bắt toàn cục để
  // CI đọc được nguyên nhân thay vì chỉ thấy "khong thay __mong_ready".
  addEventListener("error", (e) => {
    window.__mong_error = window.__mong_error || String(e.message || e.error || e);
  });
  addEventListener("unhandledrejection", (e) => {
    window.__mong_error = window.__mong_error || String(e.reason);
  });

  // winit không tự chỉnh canvas. Đặt kích thước pixel thật (CSS × dpr);
  // ResizeObserver của winit thấy và phát `Resized`.
  const canvas = document.getElementById("mong");
  const fit = () => {
    const dpr = window.devicePixelRatio || 1;
    canvas.width = Math.round(canvas.clientWidth * dpr);
    canvas.height = Math.round(canvas.clientHeight * dpr);
  };
  fit();
  addEventListener("resize", fit);

  try {
      await init();
      const res = await fetch("../../quan.mongpack");
      if (!res.ok) throw new Error(`quan.mongpack: HTTP ${res.status}`);
      start(new Uint8Array(await res.arrayBuffer()), null);
      // CI đọc cờ này qua WebDriver. Renderer đã dựng xong (start trả về sau
      // spawn_app) — panic sau đó sẽ không đặt cờ vì trang chết trước.
      window.__mong_ready = true;
    } catch (e) {
      document.title = "HONG";
      window.__mong_error = String(e);
      console.error(e);
      throw e;
    }
</script>
