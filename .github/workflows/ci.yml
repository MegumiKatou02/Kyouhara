name: CI
on: [push, pull_request]
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # Không `--all-features`: `mong-audio/web-backend` chỉ compile trên wasm32.
      - run: cargo test --workspace --features mong-audio/kira-backend
  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      # mong-project không có `fs` = không có mong-script. Nếu ai đó lỡ tay
      # kéo parser vào đường pack, job này đỏ trước khi bundle phình.
      - run: cargo clippy --manifest-path shells/web/Cargo.toml -- -D warnings
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cargo fmt --check
      - run: cargo clippy --workspace -- -D warnings
