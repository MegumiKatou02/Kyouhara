name: CI
on: [push, pull_request]
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev pkg-config

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew install pkg-config
          # macOS dùng CoreAudio, không cần ALSA

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          # Windows dùng WASAPI, không cần thêm gì
          echo "No additional dependencies needed"

      - name: Build and test
        # Không `--all-features`: `mong-audio/web-backend` chỉ compile trên wasm32.
        run: cargo test --workspace --features mong-audio/kira-backend
  wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: clippy
      - name: Install ALSA (for clippy analysis)
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev pkg-config
      # Ranh giới: đường pack không được kéo mong-script/pest vào wasm
      - run: cargo build -p mong-core -p mong-script -p mong-assets --target wasm32-unknown-unknown
      - run: cargo build -p mong-project --no-default-features --target wasm32-unknown-unknown
      # M5: rhai + đường plugin phải compile được cho wasm (DoD "chạy cả web")
      - run: cargo build -p mong-plugin -p mong-runtime --target wasm32-unknown-unknown
      # Shell web là workspace riêng — lint riêng
      - run: cargo clippy --manifest-path shells/web/Cargo.toml -- -D warnings

  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - run: cargo install wasm-bindgen-cli --locked
      - name: build
        working-directory: shells/web
        run: cargo build --release
      - name: bindgen
        run: >
          wasm-bindgen shells/web/target/wasm32-unknown-unknown/release/mong_web.wasm
          --target web --out-dir shells/web/dist
      - name: tran 5 MB gzip (DoD M4)
        run: |
          gzip -9 -c shells/web/dist/mong_web_bg.wasm > /tmp/w.gz
          SIZE=$(stat -c%s /tmp/w.gz)
          echo "gzip: $SIZE B ($(( SIZE * 100 / 5242880 ))% cua tran)"
          test "$SIZE" -le 5242880

  safari:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - run: cargo install wasm-bindgen-cli --locked
      - name: build wasm + pack demo
        run: |
          cargo run -p mong-desktop --example gen_placeholders
          cp crates/mong-render/tests/fonts/BeVietnamPro-Regular.ttf examples/quan-ca-phe/assets/fonts/
          cargo run -p mong-cli -- pack examples/quan-ca-phe -o quan.mongpack
          (cd shells/web && cargo build --release)
          wasm-bindgen shells/web/target/wasm32-unknown-unknown/release/mong_web.wasm \
            --target web --out-dir shells/web/dist
      - name: serve + safaridriver
        run: |
          set -euo pipefail
          PORT=8080
          # Runner tái dùng máy trong job; server mồ côi từ step trước có thể
          # còn giữ cổng (Errno 48). Dọn trước khi bind.
          lsof -ti tcp:$PORT | xargs -r kill -9 2>/dev/null || true

          sudo safaridriver --enable
          safaridriver --port 4444 &
          DRIVER_PID=$!
          python3 -m http.server $PORT >/dev/null 2>&1 &
          SERVER_PID=$!
          # Luôn dọn cả hai tiến trình nền khi step kết thúc, kể cả khi lỗi.
          trap 'kill $SERVER_PID $DRIVER_PID 2>/dev/null || true' EXIT

          for i in $(seq 1 20); do
            curl -sf "http://localhost:$PORT/shells/web/index.html" >/dev/null && break
            sleep 0.5
          done

          python3 ci/safari_check.py
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev pkg-config

      - run: cargo fmt --check
      - run: cargo clippy --workspace -- -D warnings
  lint-wasm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
          targets: wasm32-unknown-unknown

      - run: cargo clippy --workspace --target wasm32-unknown-unknown -- -D warnings
